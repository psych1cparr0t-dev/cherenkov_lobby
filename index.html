<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cherenkov — A multidisciplinary design firm.">
  <meta name="theme-color" content="#f5f5f5">
  <title>Cherenkov</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/index.css">
</head>

<body>
  <div id="landing-page">

    <!-- Liminal Veil: block-mosaic video canvas -->
    <canvas id="veil-canvas"></canvas>

    <!-- Rotating background patterns — fade out when mosaic reveals -->
    <div class="background-pattern pattern-1"></div>
    <div class="background-pattern pattern-2"></div>
    <div class="background-pattern pattern-3"></div>
    <div class="background-pattern pattern-4"></div>

    <!-- Wordmark -->
    <div class="wordmark-container">
      <h1 class="wordmark" id="wordmark">
        <span class="letter">C</span>
        <span class="letter">H</span>
        <span class="letter">E</span>
        <span class="letter">R</span>
        <span class="letter">E</span>
        <span class="letter">N</span>
        <span class="letter">K</span>
        <span class="letter">O</span>
        <span class="letter">V</span>
      </h1>
      <p class="wordmark-sub" id="wordmark-sub">Inc.</p>
    </div>

  </div>

  <!-- Letter proximity reveal → fires cherenkov:revealed -->
  <script src="scripts/reveal.js"></script>

  <!-- Veil config: uniform contrast/opacity for desktop and mobile -->
  <script>
    (function () {
      var mobile = window.matchMedia('(max-width: 768px)').matches;
      window.veilConfig = mobile
        ? { block: 2, lift: 20, colorScale: 0.92, desat: 0.05, maxOp: 0.92, zoomX: 1.0, zoomY: 1.0 }
        : { block: 7, lift: 20, colorScale: 0.92, desat: 0.05, maxOp: 0.92, zoomX: 1.0, zoomY: 1.0 };
    })();
  </script>

  <!-- Block-mosaic video renderer — starts on cherenkov:revealed -->
  <script src="scripts/veil_mosaic.js"></script>

</body>

</html>
