<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherenkov Design Production Line</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0c;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        .ui-header {
            position: absolute;
            top: 40px;
            left: 40px;
            pointer-events: none;
            border-left: 2px solid #2962ff;
            padding-left: 20px;
        }

        .ui-header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.3em;
            color: #eee;
        }

        .ui-header p {
            margin: 5px 0 0;
            font-size: 10px;
            letter-spacing: 0.2em;
            color: #2962ff;
        }

        .stage-monitor {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 250px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stage-item {
            font-size: 10px;
            letter-spacing: 0.1em;
            color: #444;
            transition: color 0.3s;
        }

        .stage-item.active {
            color: #2962ff;
            text-shadow: 0 0 10px rgba(41, 98, 255, 0.5);
        }

        .code-popup {
            position: absolute;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            width: 350px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #2962ff;
            padding: 25px;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            filter: blur(10px);
        }

        .code-popup.visible {
            opacity: 1;
            filter: blur(0);
            right: 60px;
        }

        .code-header {
            font-size: 12px;
            color: #2962ff;
            margin-bottom: 15px;
            border-bottom: 1px solid #2962ff;
            padding-bottom: 5px;
            font-weight: bold;
        }

        .code-content {
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            color: #aaa;
            line-height: 1.6;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="canvas-container"></div>

    <div class="ui-header">
        <h1>PRODUCTION LINE</h1>
        <p>CHERENKOV_AI_COLLABORATIVE_V1.0</p>
    </div>

    <div class="stage-monitor">
        <div id="stage-1" class="stage-item">- CONCEPT_EXTRACTION</div>
        <div id="stage-2" class="stage-item">- STRUCTURAL_ANALYSIS</div>
        <div id="stage-3" class="stage-item">- AESTHETIC_REFINEMENT</div>
        <div id="stage-4" class="stage-item">- FINAL_ASSEMBLY</div>
    </div>

    <div id="code-popup" class="code-popup">
        <div id="code-header" class="code-header"></div>
        <div id="code-content" class="code-content"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as CANNON from 'cannon-es';

        // --- Configuration ---
        const STAGES = [
            { id: 1, title: "CONCEPT_EXTRACTION", code: "const prompt = \"Modern minimalist chair with organic curves and carbon fiber frame\";\n\nconst meshGen = await CherenkovAI.generate(prompt);" },
            { id: 2, title: "STRUCTURAL_ANALYSIS", code: "function stressTest(mesh) {\n  const results = physics.applyLoad(mesh, 150.0);\n  return results.safetyFactor > 1.5;\n}" },
            { id: 3, title: "AESTHETIC_REFINEMENT", code: "mat.transmission = 1.0;\nmat.thickness = 0.5;\nmat.sheen = 1.0;\nmat.sheenColor = new THREE.Color(0x2962ff);" },
            { id: 4, title: "FINAL_ASSEMBLY", code: "// Rendering finished.\n// Cherenkov Produciton Line Complete.\n// Ready for deployment." }
        ];

        // --- Core Scene ---
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.Fog(0x0a0a0c, 10, 80);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 20, 25);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Physics ---
        const world = new CANNON.World();
        world.gravity.set(0, -15, 0); // High gravity for snappier movement
        const marblePhysMat = new CANNON.Material();
        const trackPhysMat = new CANNON.Material();
        world.addContactMaterial(new CANNON.ContactMaterial(marblePhysMat, trackPhysMat, { friction: 0.1, restitution: 0.6 }));

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0x2962ff, 500, 100, 0.5, 0.5, 2);
        spotLight.position.set(10, 30, 20);
        spotLight.castShadow = true;
        scene.add(spotLight);

        const pointLight = new THREE.PointLight(0xffffff, 50, 50);
        pointLight.position.set(-10, 5, -10);
        scene.add(pointLight);

        // --- Environment Objects ---

        // Grid Floor
        const grid = new THREE.GridHelper(100, 50, 0x2962ff, 0x111111);
        grid.position.y = -0.5;
        scene.add(grid);

        // --- The Dog (Low Poly Primitives) ---
        const dogGroup = new THREE.Group();
        dogGroup.position.set(-8, 0, -8);
        dogGroup.rotation.y = Math.PI / 4;
        scene.add(dogGroup);

        const dogMaterial = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });

        // Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.8, 2), dogMaterial);
        body.position.y = 0.8;
        dogGroup.add(body);

        // Head Group (for tracking)
        const headGroup = new THREE.Group();
        headGroup.position.set(0, 1.3, 0.8);
        dogGroup.add(headGroup);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 0.9), dogMaterial);
        headGroup.add(head);

        // Nose
        const nose = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.5), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        nose.position.set(0, -0.1, 0.6);
        headGroup.add(nose);

        // Ears
        const earGeo = new THREE.BoxGeometry(0.2, 0.5, 0.3);
        const earL = new THREE.Mesh(earGeo, dogMaterial);
        earL.position.set(0.4, 0.4, 0);
        headGroup.add(earL);
        const earR = new THREE.Mesh(earGeo, dogMaterial);
        earR.position.set(-0.4, 0.4, 0);
        headGroup.add(earR);

        // Legs
        const legGeo = new THREE.BoxGeometry(0.25, 0.8, 0.25);
        for (let i = 0; i < 4; i++) {
            const leg = new THREE.Mesh(legGeo, dogMaterial);
            leg.position.set(i % 2 === 0 ? 0.35 : -0.35, 0.4, i < 2 ? 0.7 : -0.7);
            dogGroup.add(leg);
        }

        // --- The Production Line (Continuous Track) ---

        // Helper: Create a curved ramp segment
        function createTrackSegment(x, y, z, rx, ry, rz, w, l, h) {
            const geo = new THREE.BoxGeometry(w, h, l);
            const mat = new THREE.MeshStandardMaterial({
                color: 0x222222,
                metalness: 0.9,
                roughness: 0.1,
                transparent: true,
                opacity: 0.8
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.rotation.set(rx, ry, rz);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            const body = new CANNON.Body({
                shape: new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, l / 2)),
                type: CANNON.Body.STATIC,
                material: trackPhysMat
            });
            body.position.copy(mesh.position);
            body.quaternion.copy(mesh.quaternion);
            world.addBody(body);
        }

        // --- BUILD THE CONTINUOUS LINE ---

        // 1. Initial Spiral Drop (leads directly to bridge)
        for (let i = 0; i < 30; i++) {
            const angle = i * 0.22;
            const radius = 8 - (i * 0.15);
            const height = 25 - (i * 0.4);
            createTrackSegment(
                Math.cos(angle) * radius, height, Math.sin(angle) * radius,
                0, -angle, -0.2, 3, 2, 0.2
            );
        }

        // 2. Long Bridge (starts where spiral ends)
        createTrackSegment(0, 13, 12, 0.05, 0, 0, 3, 22, 0.2);
        // Side rails for the bridge
        createTrackSegment(1.5, 13.5, 12, 0.05, 0, 0, 0.1, 22, 1);
        createTrackSegment(-1.5, 13.5, 12, 0.05, 0, 0, 0.1, 22, 1);

        // 3. Jump Landing and Slide to Assembly
        createTrackSegment(0, 8, 28, 0, 0, 0, 8, 8, 0.2);
        createTrackSegment(0, 4, 38, 0.4, 0, 0, 6, 14, 0.2);

        // --- The Design Hub (Final Assembly) ---
        const assemblyGroup = new THREE.Group();
        assemblyGroup.position.set(0, 0, 40);
        scene.add(assemblyGroup);

        const assemblyPlatform = new THREE.Mesh(
            new THREE.BoxGeometry(8, 0.5, 8),
            new THREE.MeshStandardMaterial({ color: 0x151515, metalness: 0.9, roughness: 0.1 })
        );
        assemblyGroup.add(assemblyPlatform);

        const finalBody = new CANNON.Body({
            shape: new CANNON.Box(new CANNON.Vec3(4, 0.25, 4)),
            type: CANNON.Body.STATIC,
            position: new CANNON.Vec3(0, 0, 40)
        });
        world.addBody(finalBody);

        // --- The Product (Appears at end) ---
        const chair = new THREE.Group();
        chair.scale.set(0, 0, 0);
        assemblyGroup.add(chair);

        const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x2962ff, transmission: 1, thickness: 0.5, roughness: 0.1 });
        const seat = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 2), glassMat);
        seat.position.y = 2;
        chair.add(seat);
        const back = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 0.2), glassMat);
        back.position.set(0, 3, -1);
        chair.add(back);

        // --- The Marble (Design ID) ---
        const marbleGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const marbleMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            emissive: 0x2962ff,
            emissiveIntensity: 0.5,
            metalness: 0,
            roughness: 0,
            transmission: 1,
            thickness: 0.5
        });
        const marbleMesh = new THREE.Mesh(marbleGeo, marbleMat);
        marbleMesh.castShadow = true;
        scene.add(marbleMesh);

        const marbleBody = new CANNON.Body({
            mass: 1,
            shape: new CANNON.Sphere(0.6),
            position: new CANNON.Vec3(8, 27, 0),
            material: marblePhysMat,
            linearDamping: 0.1,
            angularDamping: 0.1
        });
        world.addBody(marbleBody);

        // --- Stage Trigger Nodes ---
        const triggers = [];
        function createTrigger(x, y, z, stageData) {
            const geo = new THREE.IcosahedronGeometry(1.5, 0);
            const mat = new THREE.MeshStandardMaterial({
                color: 0x2962ff,
                emissive: 0x2962ff,
                emissiveIntensity: 5,
                transparent: true,
                opacity: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);

            const body = new CANNON.Body({
                shape: new CANNON.Sphere(2.5),
                type: CANNON.Body.STATIC,
                isTrigger: true,
                position: new CANNON.Vec3(x, y, z)
            });
            world.addBody(body);

            const trigger = { mesh, body, stageData, active: false };
            triggers.push(trigger);

            body.addEventListener('collide', (e) => {
                triggerStage(stageData);
                mesh.material.opacity = 1;
                mesh.material.emissiveIntensity = 20;
                setTimeout(() => {
                    mesh.material.opacity = 0.2;
                    mesh.material.emissiveIntensity = 5;
                }, 2000);
            });
        }

        createTrigger(0, 18, 0, STAGES[0]); // Stage 1 (Spiral)
        createTrigger(0, 13, 12, STAGES[1]); // Stage 2 (Bridge)
        createTrigger(0, 8, 28, STAGES[2]); // Stage 3 (Land)
        createTrigger(0, 1, 40, STAGES[3]); // Stage 4 (Final)

        const codePopup = document.getElementById('code-popup');
        const codeHeader = document.getElementById('code-header');
        const codeContent = document.getElementById('code-content');

        function triggerStage(stage) {
            // Update UI
            document.querySelectorAll('.stage-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`stage-${stage.id}`).classList.add('active');

            // Show Code
            codeHeader.textContent = `PROCESS_LOG // ${stage.title}`;
            codeContent.textContent = stage.code;
            codePopup.classList.add('visible');
            setTimeout(() => codePopup.classList.remove('visible'), 4000);

            // Special effect for final stage
            if (stage.id === 4) {
                renderFinalProduct();
            }
        }

        function renderFinalProduct() {
            const tl = Date.now();
            function grow() {
                const diff = (Date.now() - tl) / 1000;
                if (diff < 1) {
                    chair.scale.set(diff, diff, diff);
                    chair.rotation.y += 0.05;
                    requestAnimationFrame(grow);
                } else {
                    chair.scale.set(1, 1, 1);
                }
            }
            grow();
        }

        // --- Animation Loop ---
        const cameraOffset = new THREE.Vector3(15, 10, 15);

        function animate() {
            requestAnimationFrame(animate);

            world.fixedStep();

            marbleMesh.position.copy(marbleBody.position);
            marbleMesh.quaternion.copy(marbleBody.quaternion);

            // Smooth camera follow
            const targetPos = marbleMesh.position.clone().add(cameraOffset);
            camera.position.lerp(targetPos, 0.04);
            controls.target.lerp(marbleMesh.position, 0.04);

            // Dog Tracking Marble
            const headTarget = new THREE.Vector3().copy(marbleMesh.position);
            headGroup.lookAt(headTarget);
            // Limit rotation so he doesn't break his neck
            headGroup.rotation.x = Math.max(-0.5, Math.min(0.5, headGroup.rotation.x));
            headGroup.rotation.y = Math.max(-1, Math.min(1, headGroup.rotation.y));

            // Pulse Triggers
            triggers.forEach(t => {
                t.mesh.rotation.y += 0.01;
                t.mesh.rotation.x += 0.012;
            });

            // Reset Logic
            if (marbleBody.position.y < -10) {
                marbleBody.position.set(8, 27, 0);
                marbleBody.velocity.set(0, 0, 0);
                marbleBody.angularVelocity.set(0, 0, 0);
                chair.scale.set(0, 0, 0);
                document.querySelectorAll('.stage-item').forEach(el => el.classList.remove('active'));
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>

</html>
