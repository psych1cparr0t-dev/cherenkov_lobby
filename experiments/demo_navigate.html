            { type: 'page',         id: 'p-1',    title: 'Syllabus',                 body: 'Course overview, grading policy, schedule, and required texts.',  detail: 'CS 301 \u2014 Introduction to Artificial Intelligence\nSpring 2025 \u00b7 Dr. Ananya Patel\n\nCourse Description:\nAn introduction to the theory and practice of artificial intelligence. Topics include search algorithms, knowledge representation, machine learning, neural networks, natural language processing, and AI ethics.\n\nGrading:\n\u2022 Homework (4 \u00d7 30 pts) \u2014 120 pts\n\u2022 Lab Reports (2 \u00d7 50 pts) \u2014 100 pts\n\u2022 Midterm Essay \u2014 100 pts\n\u2022 Final Project \u2014 200 pts\n\u2022 Participation \u2014 80 pts\n\u2022 Total: 600 pts\n\nRequired Text:\nRussell & Norvig, \u201cArtificial Intelligence: A Modern Approach\u201d (4th Ed.)\n\nAcademic Integrity:\nAll work must be your own unless explicitly stated otherwise. Use of AI tools must be disclosed.', url: 'https://canvas.university.edu/courses/CS301/pages/syllabus' },

        window.searchIndex = function(query) {
            var tokens = query.toLowerCase().match(/\w+/g);
            if (!tokens || tokens.length === 0) return null;
            var best = null, bestScore = 0;
            for (var i = 0; i < window.COURSE_DATA.length; i++) {
                var item = window.COURSE_DATA[i];
                var hay = (item.title + ' ' + item.body).toLowerCase();
                var titleLow = item.title.toLowerCase();
                var score = 0;
                for (var j = 0; j < tokens.length; j++) {
                    if (hay.indexOf(tokens[j]) !== -1) score += 1;
                    if (titleLow.indexOf(tokens[j]) !== -1) score += 0.5;
                }
                if (score > bestScore) { bestScore = score; best = item; }
            }
            return bestScore > 0 ? best : null;
        };

            static properties = {
                messages:   { type: Array },
                inputText:  { type: String },
                processing: { type: Boolean },
                isDragging: { type: Boolean },
            };

            constructor() {
                super();
                const hw = window.COURSE_DATA.find(d => d.id === 'a-4812');
                this.messages = [{ role: 'bot', text: 'Hi. I see ' + hw.title + ' is due ' + hw.due + '. Drag your file here to submit.' }];
                this.inputText = '';
                this.processing = false;
                this.isDragging = false;
            }

            addMessage(msg) {
                this.messages = [...this.messages, msg];
                this.updateComplete.then(() => {
                    const chat = this.shadowRoot.querySelector('.chat-area');
                    if (chat) chat.scrollTop = chat.scrollHeight;
                });
            }

            /* ── Intent classification ─────────────────────────── */
            /* Mirrors _looks_like_action_request() from main.py:
               Only explicit action keywords trigger navigation.
               Everything else gets a conversational response
               (simulating 3B model for chat, 8B for tools). */

            classifyIntent(text) {
                const l = text.toLowerCase();
                // Greetings / chitchat → 3B conversational (no tools)
                if (/^(hi|hello|hey|yo|sup|what'?s up|good morning|good afternoon)\b/i.test(l)) return 'greeting';
                if (/^(thanks|thank you|thx|ok|okay|cool|bye|goodbye|see ya|great|nice)\b/i.test(l)) return 'farewell';
                // Action keywords → 8B model + tools (from main.py)
                if (/\b(show me|open|go to|take me|where is|find|navigate to)\b/.test(l)) return 'navigate';
                // Conversational intents → 3B model + RAG
                if (/\b(when|due|deadline|upcoming)\b/.test(l)) return 'due_dates';
                if (/\b(grade|score|marks|how did i|my grade|gpa)\b/.test(l)) return 'grades';
                if (/\b(help|what can you|how do i|capabilities)\b/.test(l)) return 'help';
                if (/\b(office hours?|professor|dr\.|instructor)\b/.test(l)) return 'office_hours';
                if (/\b(submit|upload|turn in|hand in)\b/.test(l)) return 'submit';
                // Topic reference → 3B + RAG (info response, not navigation)
                if (l.length > 4) {
                    const m = window.searchIndex(text);
                    if (m) return 'topic';
                }
                return 'general';
            }

            generateResponse(intent, text) {
                const DATA = window.COURSE_DATA;
                switch (intent) {
                    case 'greeting':
                        return { narration: 'Hey! How can I help you with CS 301 today?' };
                    case 'farewell':
                        return { narration: 'See you! Good luck with your assignments.' };
                    case 'navigate': {
                        const m = window.searchIndex(text);
                        if (m) return { narration: 'Opening ' + m.title + '.', nav: { type: m.type, title: m.title, url: m.url, itemId: m.id } };
                        return { narration: "I couldn\u2019t find that page. Could you be more specific?" };
                    }
                    case 'due_dates': {
                        const a = DATA.filter(d => d.type === 'assignment' && d.due);
                        const lines = a.map(x => '\u2022 ' + x.title + ' \u2014 ' + x.due + ' (' + x.pts + ' pts)').join('\n');
                        return { narration: 'Here are your upcoming deadlines:\n\n' + lines };
                    }
                    case 'grades':
                        return { narration: 'Your current grades:\n\n\u2022 Midterm Essay \u2014 87/100 (Graded)\n\u2022 Final Project \u2014 Pending\n\u2022 Homework 3 \u2014 Pending\n\u2022 Lab Report 2 \u2014 Pending\n\nThe class average on the Midterm was 78.4.' };
                    case 'help':
                        return { narration: 'I can help you with:\n\n\u2022 Navigate to pages \u2014 "show me the syllabus"\n\u2022 Check due dates \u2014 "when is the midterm due?"\n\u2022 View grades \u2014 "what\u2019s my grade?"\n\u2022 Submit files \u2014 drag & drop below\n\u2022 Course info \u2014 "office hours"\n\nJust ask naturally!' };
                    case 'office_hours':
                        return { narration: 'Dr. Patel\u2019s office hours:\n\u2022 Thursday 2:00\u20134:00 PM, Room 214 Science Hall\n\nTA office hours:\n\u2022 Monday 5\u20137 PM, CS Lab\n\nYou can also email to schedule an appointment.' };
                    case 'submit':
                        return { narration: 'Drag and drop your file onto the upload area below. I accept PDF, DOCX, and Pages formats.\n\nIf it\u2019s not a PDF, I\u2019ll convert it automatically before submitting.' };
                    case 'topic': {
                        const m = window.searchIndex(text);
                        if (!m) return { narration: "Could you be more specific?" };
                        let info = '';
                        if (m.type === 'assignment') {
                            info = m.title + ' \u2014 ' + m.body + (m.due ? ' Due ' + m.due + '.' : '') + (m.pts ? ' Worth ' + m.pts + ' pts.' : '');
                        } else if (m.type === 'announcement') {
                            info = m.title + ': ' + m.body;
                        } else {
                            info = m.title + ' \u2014 ' + m.body;
                        }
                        return { narration: info + '\n\nSay \u201cshow me ' + m.title.toLowerCase() + '\u201d to open it.' };
                    }
                    default:
                        return { narration: 'I\u2019m your assistant for CS 301. Ask me about assignments, due dates, grades, or say \u201cshow me\u201d to navigate to a page.' };
                }
            }

            /* ── Send ──────────────────────────────────────────── */

            async handleSend() {
                const text = this.inputText.trim();
                if (!text || this.processing) return;
                this.inputText = '';
                this.addMessage({ role: 'user', text });
                this.processing = true;
                await new Promise(r => setTimeout(r, 500 + Math.random() * 500));
                const intent = this.classifyIntent(text);
                const resp = this.generateResponse(intent, text);
                this.processing = false;
                if (resp.narration) this.addMessage({ role: 'bot', text: resp.narration });
                if (resp.nav) this.addMessage({ role: 'nav', ...resp.nav });
            }

            /* ── File drop ─────────────────────────────────────── */

            handleDragOver(e)  { e.preventDefault(); this.isDragging = true; }
            handleDragLeave(e) { e.preventDefault(); this.isDragging = false; }

            async handleDrop(e) {
                e.preventDefault();
                this.isDragging = false;
                const file = e.dataTransfer?.files?.[0];
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                this.addMessage({ role: 'user', text: 'Attached: ' + file.name });
                this.processing = true;
                const convert = (ext === 'pages' || ext === 'docx');
                if (convert) {
                    await new Promise(r => setTimeout(r, 800));
                    this.addMessage({ role: 'bot', text: 'Detected .' + ext + ' file. Converting to PDF\u2026' });
                    this.requestUpdate();
                    await new Promise(r => setTimeout(r, 1500));
                    this.addMessage({ role: 'bot', text: 'Conversion complete. Submitting to Canvas\u2026' });
                    this.requestUpdate();
                } else {
                    await new Promise(r => setTimeout(r, 600));
                    this.addMessage({ role: 'bot', text: 'Submitting to Canvas\u2026' });
                    this.requestUpdate();
                }
                await new Promise(r => setTimeout(r, 1000));
                this.processing = false;
                const rid = 'AF-' + Math.floor(1000 + Math.random() * 9000);
                this.addMessage({ role: 'receipt', text: 'Submitted successfully.\nConfirmation: ' + rid + '\n' + new Date().toLocaleString() });
            }

            handleNavClick(itemId) { window.lmsOpenItem(itemId); }

            /* ── Render ────────────────────────────────────────── */

            render() {
                return html`
                    <div class="widget-container">
                        <div class="header">
                            <div class="header-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                            </div>
                            <div class="header-text">
                                <h3>Socrates</h3>
                                <p>Symposium Connector</p>
                            </div>
                        </div>
                        <div class="chat-area">
                            ${this.messages.map(msg => {
                                if (msg.role === 'nav') return html`
                                    <div class="nav-card">
                                        <div class="nav-card-header">
                                            <div class="nav-card-icon">${TYPE_ICONS[msg.type]}</div>
                                            <span class="nav-card-label">${TYPE_LABELS[msg.type]}</span>
                                        </div>
                                        <div class="nav-card-title">${msg.title}</div>
                                        <button class="nav-card-btn" @click=${() => this.handleNavClick(msg.itemId)}>
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                                            Open in LMS
                                        </button>
                                    </div>`;
                                if (msg.role === 'receipt') return html`
                                    <div class="receipt">
                                        <div class="receipt-check">\u2713</div>
                                        <div class="receipt-body">${msg.text}</div>
                                    </div>`;
                                return html`<div class="message ${msg.role}">${msg.text}</div>`;
                            })}
                            ${this.processing ? html`<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>` : ''}
                        </div>
                        <div class="drop-zone ${this.isDragging ? 'active' : ''}"
                             @dragover=${this.handleDragOver}
                             @dragleave=${this.handleDragLeave}
                             @drop=${this.handleDrop}>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <div class="drop-title">Drag Assignment Here</div>

                        </div>
                        <div class="input-area">
                            <input type="text" .value=${this.inputText}
                                @input=${e => this.inputText = e.target.value}
                                @keydown=${e => e.key === 'Enter' && this.handleSend()}
                                placeholder="Type a command...">
                            <button class="send-btn" @click=${this.handleSend} ?disabled=${!this.inputText.trim()}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            }
        }
        customElements.define('socrates-demo', SocratesDemo);

<script>
    const DATA = window.COURSE_DATA;
    const CONTENT = document.getElementById('lmsContent');
    let currentView = 'home';
    let currentItemId = null;

    /* ── SVG icon bank ─────────────────────────────────────────── */
    const ICON = {
        assignment:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
        announcement: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
        page:         '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
        discussion:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
        arrow:        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>',
        back:         '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>',
    };

    const SECTION_TITLES = {
        assignments: 'Assignments', announcements: 'Announcements',
        pages: 'Pages', discussions: 'Discussions',
    };

    /* ── Render helpers ────────────────────────────────────────── */

    function itemCard(item) {
        const meta = [];
        if (item.due) meta.push(`Due ${item.due}`);
        if (item.pts) meta.push(`${item.pts} pts`);
        if (item.replies) meta.push(`${item.replies} replies`);
        return `
            <div class="lms-item" id="lms-${item.id}" onclick="lmsOpenItem('${item.id}')">
                <div class="lms-item-icon ${item.type}">${ICON[item.type]}</div>
                <div class="lms-item-body">
                    <div class="lms-item-title">${item.title}</div>
                    <div class="lms-item-desc">${item.body}</div>
                    ${meta.length ? `<div class="lms-item-meta">${meta.map(m=>`<span>${m}</span>`).join('')}</div>` : ''}
                </div>
                <div class="lms-item-arrow">${ICON.arrow}</div>
            </div>`;
    }

    function sectionBlock(type) {
        const items = DATA.filter(d => d.type === type);
        return `
            <div class="lms-section">
                <div class="lms-section-header">
                    ${ICON[type]}
                    <h2>${SECTION_TITLES[type + 's'] || type}</h2>
                    <span class="count">${items.length}</span>
                </div>
                ${items.map(itemCard).join('')}
            </div>`;
    }

    /* ── Views ─────────────────────────────────────────────────── */

    function renderHome() {
        CONTENT.innerHTML = `
            <div class="lms-page-header">
                <h1>CS 301 — Intro to Artificial Intelligence</h1>
                <p class="lms-subtitle">Spring 2025 &middot; Dr. Ananya Patel &middot; MWF 10:00 – 10:50 AM &middot; Room 214 Science Hall</p>
            </div>
            ${sectionBlock('assignment')}
            ${sectionBlock('announcement')}
            ${sectionBlock('page')}
            ${sectionBlock('discussion')}
        `;
        CONTENT.scrollTop = 0;
    }

    function renderList(type) {
        const items = DATA.filter(d => d.type === type);
        const label = SECTION_TITLES[type + 's'] || type;
        CONTENT.innerHTML = `
            <div class="lms-page-header">
                <h1>${label}</h1>
                <p class="lms-subtitle">${items.length} item${items.length !== 1 ? 's' : ''} in CS 301</p>
            </div>
            <div class="lms-section">
                ${items.map(itemCard).join('')}
            </div>
        `;
        CONTENT.scrollTop = 0;
    }

    function renderDetail(itemId) {
        const item = DATA.find(d => d.id === itemId);
        if (!item) return;

        const parentView = item.type + 's';
        const parentLabel = SECTION_TITLES[parentView];

        const meta = [];
        if (item.due) meta.push({ label: 'Due', value: item.due });
        if (item.pts) meta.push({ label: 'Points', value: item.pts });
        if (item.replies) meta.push({ label: 'Replies', value: item.replies });
        meta.push({ label: 'Type', value: item.type.charAt(0).toUpperCase() + item.type.slice(1) });

        CONTENT.innerHTML = `
            <a class="lms-back" onclick="lmsNavigate('${parentView}')">
                ${ICON.back} Back to ${parentLabel}
            </a>
            <div class="lms-detail">
                <div class="lms-detail-header">
                    <div class="lms-detail-icon ${item.type}">${ICON[item.type]}</div>
                    <div>
                        <div class="lms-detail-type">${item.type}</div>
                        <div class="lms-detail-title">${item.title}</div>
                    </div>
                </div>
                ${meta.length ? `
                    <div class="lms-detail-meta">
                        ${meta.map(m => `
                            <div class="lms-detail-meta-item">
                                <span class="lms-detail-meta-label">${m.label}</span>
                                <span class="lms-detail-meta-value">${m.value}</span>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                <div class="lms-detail-body">${item.detail || item.body}</div>
            </div>
        `;
        CONTENT.scrollTop = 0;
    }

    function renderGrades() {
        const assignments = DATA.filter(d => d.type === 'assignment');
        CONTENT.innerHTML = `
            <div class="lms-page-header">
                <h1>Grades</h1>
                <p class="lms-subtitle">CS 301 — Spring 2025</p>
            </div>
            <table class="grades-table">
                <thead>
                    <tr>
                        <th>Assignment</th>
                        <th>Due</th>
                        <th>Points</th>
                        <th>Score</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    ${assignments.map((a, i) => {
                        const graded = i < 2;
                        const score = graded ? Math.floor(a.pts * (0.75 + Math.random() * 0.25)) : '—';
                        return `
                            <tr style="cursor:pointer" onclick="lmsOpenItem('${a.id}')">
                                <td style="font-weight:600">${a.title}</td>
                                <td>${a.due}</td>
                                <td>${a.pts}</td>
                                <td>${graded ? score + ' / ' + a.pts : '—'}</td>
                                <td><span class="grade-badge ${graded ? 'graded' : 'pending'}">${graded ? 'Graded' : 'Pending'}</span></td>
                            </tr>`;
                    }).join('')}
                </tbody>
            </table>
        `;
        CONTENT.scrollTop = 0;
    }

    /* ── Router ────────────────────────────────────────────────── */

    function updateSidebar(view) {
        document.querySelectorAll('.lms-nav-item[data-view]').forEach(el => {
            el.classList.toggle('active', el.dataset.view === view);
        });
    }

    function updateBreadcrumb(view, item) {
        const bc = document.getElementById('breadcrumb');
        let trail = `<a onclick="lmsNavigate('home')">Dashboard</a> / `;
        if (view === 'home') {
            trail += `<span class="crumb-current">CS 301</span>`;
        } else if (view === 'detail' && item) {
            const parentView = item.type + 's';
            trail += `<a onclick="lmsNavigate('home')">CS 301</a> / `;
            trail += `<a onclick="lmsNavigate('${parentView}')">${SECTION_TITLES[parentView]}</a> / `;
            trail += `<span class="crumb-current">${item.title}</span>`;
        } else {
            trail += `<a onclick="lmsNavigate('home')">CS 301</a> / `;
            trail += `<span class="crumb-current">${SECTION_TITLES[view] || view}</span>`;
        }
        bc.innerHTML = trail;
    }

    window.lmsNavigate = function(view) {
        currentView = view;
        currentItemId = null;
        updateSidebar(view);

        if (view === 'home') {
            renderHome();
        } else if (view === 'grades') {
            renderGrades();
        } else {
            // strip trailing 's' to get type
            const type = view.replace(/s$/, '');
            renderList(type);
        }
        updateBreadcrumb(view, null);
    };

    window.lmsOpenItem = function(itemId) {
        const item = DATA.find(d => d.id === itemId);
        if (!item) return;

        currentView = 'detail';
        currentItemId = itemId;
        updateSidebar(item.type + 's');
        renderDetail(itemId);
        updateBreadcrumb('detail', item);

        // Highlight flash on the detail header
        setTimeout(() => {
            const header = CONTENT.querySelector('.lms-detail-header');
            if (header) {
                header.style.transition = 'background 0.3s, box-shadow 0.3s';
                header.style.background = '#eef2ff';
                header.style.borderRadius = '10px';
                header.style.padding = '14px';
                header.style.boxShadow = '0 0 0 3px rgba(99,102,241,0.15)';
                setTimeout(() => {
                    header.style.background = 'transparent';
                    header.style.boxShadow = 'none';
                }, 2000);
            }
        }, 100);
    };

    /* ── Chip clicks ───────────────────────────────────────────── */
    document.querySelectorAll('.try-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const widget = document.querySelector('socrates-demo');
            if (!widget) return;
            widget.inputText = chip.textContent;
            widget.requestUpdate();
            setTimeout(() => {
                const input = widget.shadowRoot?.querySelector('input');
                if (input) input.focus();
            }, 50);
        });
    });

    /* ── Boot ──────────────────────────────────────────────────── */
    lmsNavigate('home');
</script>

</body>
</html>
