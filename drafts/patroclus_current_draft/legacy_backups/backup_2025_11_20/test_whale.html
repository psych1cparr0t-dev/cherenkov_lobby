<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Test: Autonomous Whale</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #001133;
        }

        canvas {
            display: block;
        }

        #debug {
            position: absolute;
            top: 10px;
            left: 10px;
            color: cyan;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="debug">Status: Simulating Deep Sea...</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // SCENE SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x001133, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 20;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // LIGHTING
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // WHALE CONSTRUCT (Abstract "Frutiger Aero" Whale)
        const whaleGroup = new THREE.Group();

        // Body
        const bodyGeo = new THREE.CapsuleGeometry(1, 4, 4, 8);
        const bodyMat = new THREE.MeshPhongMaterial({
            color: 0x00aaff,
            shininess: 100,
            transparent: true,
            opacity: 0.8
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.z = Math.PI / 2;
        whaleGroup.add(body);

        // Tail
        const tailGeo = new THREE.ConeGeometry(0.8, 2, 32);
        const tail = new THREE.Mesh(tailGeo, bodyMat);
        tail.position.x = -2.5;
        tail.rotation.z = Math.PI / 2;
        whaleGroup.add(tail);

        // Fins
        const finGeo = new THREE.BoxGeometry(1, 0.2, 2);
        const fin = new THREE.Mesh(finGeo, bodyMat);
        fin.position.x = 1;
        whaleGroup.add(fin);

        scene.add(whaleGroup);

        // PARTICLES (Plankton)
        const particlesGeo = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);
        for (let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ size: 0.1, color: 0xffffff });
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);

        // MOVEMENT LOGIC (Catmull-Rom Spline Path)
        // Creating a closed loop path for the whale to swim
        const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(-10, 0, 0),
            new THREE.Vector3(-5, 5, -5),
            new THREE.Vector3(0, 0, -10),
            new THREE.Vector3(5, -5, -5),
            new THREE.Vector3(10, 0, 0),
            new THREE.Vector3(5, 5, 5),
            new THREE.Vector3(0, 0, 10),
            new THREE.Vector3(-5, -5, 5)
        ]);
        curve.closed = true;

        const points = curve.getPoints(50);
        const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0xff0000, visible: false }); // Hide path
        const pathLine = new THREE.Line(lineGeometry, lineMaterial);
        scene.add(pathLine);

        // ANIMATION LOOP
        let progress = 0;
        const speed = 0.0005;

        function animate() {
            requestAnimationFrame(animate);

            // Update Whale Position along Spline
            progress += speed;
            if (progress > 1) progress = 0;

            const position = curve.getPoint(progress);
            const tangent = curve.getTangent(progress);

            whaleGroup.position.copy(position);

            // Orient whale to face direction of movement
            // We use a lookAt with a slight offset to smooth it out
            const lookAtPos = curve.getPoint((progress + 0.01) % 1);
            whaleGroup.lookAt(lookAtPos);

            // Add subtle "swimming" roll/wobble
            whaleGroup.rotation.z += Math.sin(Date.now() * 0.002) * 0.1;

            // Rotate particles slowly
            particles.rotation.y += 0.0005;

            renderer.render(scene, camera);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
