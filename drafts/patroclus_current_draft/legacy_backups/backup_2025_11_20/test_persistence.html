<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Test: Persistent Concierge</title>
    <style>
        /* BASIC RESET */
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* PERSISTENT LAYER (Z-Index 1000) */
        #concierge-layer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            z-index: 1000;
            /* Always on top */
            pointer-events: none;
            /* Let clicks pass through around the orb */
        }

        #concierge-orb {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #fff, #00ffcc);
            border-radius: 50%;
            box-shadow: 0 0 20px #00ffcc;
            pointer-events: auto;
            /* Catch clicks on the orb itself */
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #005544;
            font-weight: bold;
        }

        #concierge-orb:hover {
            transform: scale(1.1);
        }

        /* CONTENT LAYER (Z-Index 1) */
        #content-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: opacity 0.5s ease;
        }

        /* PAGES */
        .page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #page-home {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }

        #page-gallery {
            background: linear-gradient(135deg, #2c3e50, #fd746c);
        }

        #page-about {
            background: linear-gradient(135deg, #000000, #434343);
        }

        /* NAVIGATION */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        nav button {
            background: none;
            border: none;
            color: white;
            margin: 0 10px;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav button:hover {
            color: #00ffcc;
        }
    </style>
</head>

<body>

    <!-- PERSISTENT CONCIERGE -->
    <div id="concierge-layer">
        <div id="concierge-orb" onclick="alert('I am Felix. I persist across time and space.')">
            FELIX
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav>
        <button onclick="navigateTo('home')">Home</button>
        <button onclick="navigateTo('gallery')">Gallery</button>
        <button onclick="navigateTo('about')">About</button>
    </nav>

    <!-- DYNAMIC CONTENT VIEWPORT -->
    <div id="content-viewport">
        <!-- Initial Content -->
        <div id="page-home" class="page">
            <h1>HOME SECTOR</h1>
            <p>Welcome to the Patroclus Hub.</p>
        </div>
    </div>

    <script>
        // SPA ROUTER LOGIC
        const pages = {
            'home': `
                <div id="page-home" class="page">
                    <h1>HOME SECTOR</h1>
                    <p>Welcome to the Patroclus Hub.</p>
                </div>
            `,
            'gallery': `
                <div id="page-gallery" class="page">
                    <h1>VISUAL ARCHIVE</h1>
                    <p>Scanning latent space artifacts...</p>
                </div>
            `,
            'about': `
                <div id="page-about" class="page">
                    <h1>MISSION DATA</h1>
                    <p>Cinematic Cohesion. Agentic Futures.</p>
                </div>
            `
        };

        function navigateTo(pageId) {
            const viewport = document.getElementById('content-viewport');

            // 1. Fade Out
            viewport.style.opacity = '0';

            setTimeout(() => {
                // 2. Swap Content
                viewport.innerHTML = pages[pageId];

                // 3. Fade In
                viewport.style.opacity = '1';

                // Note: Felix (#concierge-layer) was never touched!
                console.log(`Navigated to ${pageId}. Felix persisted.`);
            }, 500);
        }
    </script>

</body>

</html>
