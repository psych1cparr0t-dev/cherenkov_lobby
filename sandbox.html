<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cherenkov — Sandbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #hud {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 0.14em;
            padding: 10px 22px;
            background: transparent;
            border: 1px solid #d0d0d0;
            color: #888;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
            pointer-events: auto;
        }

        .btn:hover {
            border-color: #2962ff;
            color: #2962ff;
            background: rgba(41, 98, 255, 0.05);
        }

        #disk-label {
            font-size: 10px;
            color: #bbb;
            letter-spacing: 0.12em;
            pointer-events: none;
        }

        #disk-select {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 0.1em;
            padding: 9px 12px;
            background: transparent;
            border: 1px solid #d0d0d0;
            color: #888;
            cursor: pointer;
            border-radius: 2px;
            appearance: none;
            pointer-events: auto;
        }

        #disk-select:focus {
            outline: none;
            border-color: #2962ff;
        }

        #status-bar {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #bbb;
            letter-spacing: 0.18em;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        #move-hud {
            position: fixed;
            top: 22px;
            right: 30px;
            text-align: right;
            pointer-events: none;
        }

        #move-count {
            font-size: 28px;
            font-weight: 400;
            color: #aaa;
            letter-spacing: 0.08em;
        }

        #move-label {
            font-size: 10px;
            color: #ccc;
            letter-spacing: 0.18em;
            margin-top: 4px;
        }

        #win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(240, 240, 240, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s;
        }

        #win-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        #win-word {
            font-size: 11px;
            color: #2962ff;
            letter-spacing: 0.3em;
            margin-bottom: 24px;
        }

        #win-time-display {
            font-size: 64px;
            font-weight: 500;
            color: #444;
            letter-spacing: 0.05em;
        }

        #win-moves-display {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 0.12em;
            margin: 12px 0 40px;
        }

        #win-reset {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 0.18em;
            padding: 14px 36px;
            background: transparent;
            border: 1px solid rgba(41, 98, 255, 0.3);
            color: #2962ff;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

        #win-reset:hover {
            background: rgba(41, 98, 255, 0.08);
        }
    </style>
</head>

<body>

    <div id="move-hud">
        <div id="move-count">0</div>
        <div id="move-label">moves</div>
    </div>

    <div id="status-bar">click a peg to select — click again to move</div>

    <div id="hud">
        <label id="disk-label" for="disk-select">DISKS</label>
        <select id="disk-select">
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5" selected>5</option>
            <option value="6">6</option>
            <option value="7">7</option>
        </select>
        <button class="btn" id="reset-btn">RESET</button>
    </div>

    <div id="win-overlay">
        <div id="win-word">SOLVED</div>
        <div id="win-time-display">00:00.0</div>
        <div id="win-moves-display">— moves</div>
        <button id="win-reset">PLAY AGAIN</button>
    </div>

    <script>
        // ─── GAME LOGIC ──────────────────────────────────────────────────────────────
        class HanoiGame {
            constructor(n) {
                this.n = n;
                this.pegs = [[], [], []];
                for (let i = n; i >= 1; i--) this.pegs[0].push(i);
                this.moves = 0;
            }
            topDisk(p) { const s = this.pegs[p]; return s.length ? s[s.length - 1] : null; }
            canMove(f, t) {
                if (!this.pegs[f].length) return false;
                if (!this.pegs[t].length) return true;
                return this.topDisk(f) < this.topDisk(t);
            }
            move(f, t) {
                if (!this.canMove(f, t)) return null;
                const d = this.pegs[f].pop(); this.pegs[t].push(d); this.moves++; return d;
            }
            isWon() { return this.pegs[2].length === this.n; }
        }

        // ─── THREE.JS SETUP ──────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setClearColor(0xf0f0f0);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0xf0f0f0, 22, 40);

        const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 6, 11);
        camera.lookAt(0, 0.5, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(5, 12, 8);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(2048, 2048);
        Object.assign(dirLight.shadow.camera, { near: 0.5, far: 40, left: -8, right: 8, top: 8, bottom: -4 });
        scene.add(dirLight);
        const fill = new THREE.DirectionalLight(0xd0d8ff, 0.3);
        fill.position.set(-4, 5, -3);
        scene.add(fill);

        // ─── CONSTANTS ───────────────────────────────────────────────────────────────
        const PEG_X = [-3.2, 0, 3.2];
        const PEG_HEIGHT = 3.8;
        const DISK_H = 0.28;
        const DISK_COLORS = [0x1a237e, 0x283593, 0x303f9f, 0x3949ab, 0x3f51b5, 0x5c6bc0, 0x7986cb];

        // ─── SCENE: BASE + PEGS ──────────────────────────────────────────────────────
        const base = new THREE.Mesh(
            new THREE.BoxGeometry(10, 0.18, 2.6),
            new THREE.MeshLambertMaterial({ color: 0xe0e0e0 })
        );
        base.position.y = -0.09; base.receiveShadow = true; scene.add(base);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.ShadowMaterial({ opacity: 0.08 }));
        floor.rotation.x = -Math.PI / 2; floor.position.y = -0.18; floor.receiveShadow = true; scene.add(floor);

        const pegMeshes = [];
        PEG_X.forEach(x => {
            const m = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, PEG_HEIGHT, 16), new THREE.MeshLambertMaterial({ color: 0x888888 }));
            m.position.set(x, PEG_HEIGHT / 2, 0); m.castShadow = true; scene.add(m); pegMeshes.push(m);
        });

        const clickZones = [];
        PEG_X.forEach((x, i) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(2.2, PEG_HEIGHT + 1, 2.2), new THREE.MeshBasicMaterial({ visible: false }));
            m.position.set(x, PEG_HEIGHT / 2, 0); m.userData.pegIndex = i; scene.add(m); clickZones.push(m);
        });

        // ─── DISK MANAGEMENT ─────────────────────────────────────────────────────────
        let game = null, diskMeshes = [], numDisks = 5;

        function diskY(i) { return DISK_H / 2 + i * (DISK_H + 0.01); }
        function diskRadius(d, n) { return 0.45 + (d - 1) * ((1.5 - 0.45) / Math.max(n - 1, 1)); }

        function buildDisks(n) {
            diskMeshes.forEach(m => m && scene.remove(m));
            diskMeshes = new Array(n + 1).fill(null);
            for (let d = 1; d <= n; d++) {
                const r = diskRadius(d, n);
                const ci = Math.round((d - 1) / Math.max(n - 1, 1) * (DISK_COLORS.length - 1));
                const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, DISK_H, 32), new THREE.MeshLambertMaterial({ color: DISK_COLORS[ci] }));
                m.castShadow = m.receiveShadow = true; scene.add(m); diskMeshes[d] = m;
            }
        }

        function syncDisks() {
            game.pegs.forEach((stk, pi) => stk.forEach((d, si) => { if (diskMeshes[d]) diskMeshes[d].position.set(PEG_X[pi], diskY(si), 0); }));
        }

        // ─── 3D TIMER CARD ───────────────────────────────────────────────────────────
        const CARD_W = 3.0, CARD_H = 1.1, CARD_D = 0.09;
        const timerCanvas = document.createElement('canvas');
        timerCanvas.width = 512; timerCanvas.height = 192;
        const tCtx = timerCanvas.getContext('2d');

        const timerTex = new THREE.CanvasTexture(timerCanvas);
        const cardMat = new THREE.MeshLambertMaterial({ map: timerTex, transparent: true });
        const cardGeo = new THREE.BoxGeometry(CARD_W, CARD_H, CARD_D);
        const timerCard = new THREE.Mesh(cardGeo, [
            new THREE.MeshLambertMaterial({ color: 0x222244, transparent: true, opacity: 0.85 }), // right
            new THREE.MeshLambertMaterial({ color: 0x222244, transparent: true, opacity: 0.85 }), // left
            new THREE.MeshLambertMaterial({ color: 0x222244, transparent: true, opacity: 0.85 }), // top
            new THREE.MeshLambertMaterial({ color: 0x222244, transparent: true, opacity: 0.85 }), // bottom
            cardMat, // front face
            new THREE.MeshLambertMaterial({ color: 0x1a1a33, transparent: true, opacity: 0.85 }), // back
        ]);
        timerCard.position.set(-4.5, 5.5, 3.0);
        timerCard.castShadow = true;
        scene.add(timerCard);

        function drawTimerCard(timeStr, movesStr) {
            const cw = timerCanvas.width, ch = timerCanvas.height;
            tCtx.clearRect(0, 0, cw, ch);
            // Background
            const rr = 28;
            tCtx.fillStyle = 'rgba(20, 20, 50, 0.92)';
            tCtx.beginPath();
            tCtx.roundRect(4, 4, cw - 8, ch - 8, rr);
            tCtx.fill();
            // Subtle top accent line
            tCtx.strokeStyle = 'rgba(80, 120, 255, 0.4)';
            tCtx.lineWidth = 2;
            tCtx.beginPath();
            tCtx.roundRect(4, 4, cw - 8, ch - 8, rr);
            tCtx.stroke();
            // Time text
            tCtx.fillStyle = '#e8eeff';
            tCtx.font = '700 88px Orbitron, monospace';
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText(timeStr, cw / 2, ch / 2 - 8);
            // Moves label
            tCtx.fillStyle = 'rgba(160, 170, 220, 0.6)';
            tCtx.font = '400 22px Orbitron, monospace';
            tCtx.fillText(movesStr, cw / 2, ch - 30);
            timerTex.needsUpdate = true;
        }

        // ─── PHYSICS ─────────────────────────────────────────────────────────────────
        const vel = new THREE.Vector3(0.02, 0, -0.01);
        const angVel = new THREE.Vector3(0, 0, 0);
        const GRAVITY = 0.006;
        const DAMPING = 0.97;
        const FLOOR_Y = -1.2;
        const CEIL_Y = 7.5;
        const SIDE_X = 7.0;

        function physicsStep() {
            if (isDragging) return;
            vel.y -= GRAVITY;
            vel.multiplyScalar(DAMPING);
            timerCard.position.add(vel);
            timerCard.rotation.x += angVel.x;
            timerCard.rotation.y += angVel.y;
            timerCard.rotation.z += angVel.z;
            angVel.multiplyScalar(0.96);

            // Bounce off floor
            if (timerCard.position.y < FLOOR_Y) {
                timerCard.position.y = FLOOR_Y;
                vel.y = Math.abs(vel.y) * 0.55;
                vel.x *= 0.85; vel.z *= 0.85;
                angVel.z += (Math.random() - 0.5) * 0.06;
            }
            // Ceiling
            if (timerCard.position.y > CEIL_Y) {
                timerCard.position.y = CEIL_Y; vel.y = -Math.abs(vel.y) * 0.6;
            }
            // Sides
            if (Math.abs(timerCard.position.x) > SIDE_X) {
                timerCard.position.x = Math.sign(timerCard.position.x) * SIDE_X;
                vel.x *= -0.6; angVel.z += (Math.random() - 0.5) * 0.08;
            }
            // Z bounds
            if (timerCard.position.z > 6) { timerCard.position.z = 6; vel.z *= -0.6; }
            if (timerCard.position.z < -4) { timerCard.position.z = -4; vel.z *= -0.6; }
        }

        // ─── DRAG ────────────────────────────────────────────────────────────────────
        let isDragging = false;
        const dragPlane = new THREE.Plane();
        const dragOffset = new THREE.Vector3();
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const prevMouse = new THREE.Vector2();
        const mouseVelWorld = new THREE.Vector3();
        let prevCardPos = new THREE.Vector3();

        renderer.domElement.addEventListener('mousedown', onMouseDown);
        renderer.domElement.addEventListener('mousemove', onMouseMove);
        renderer.domElement.addEventListener('mouseup', onMouseUp);

        function getMouse(e) {
            mouse.x = (e.clientX / innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        }

        function onMouseDown(e) {
            getMouse(e);
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(timerCard, true);
            if (hits.length) {
                isDragging = true;
                renderer.domElement.style.cursor = 'grabbing';
                // Build drag plane: perpendicular to camera, through card center
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                dragPlane.setFromNormalAndCoplanarPoint(camDir, timerCard.position);
                // Record offset from card center to hit point
                const pt = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, pt);
                dragOffset.subVectors(timerCard.position, pt);
                prevCardPos.copy(timerCard.position);
                prevMouse.copy(mouse);
                // Kill physics
                vel.set(0, 0, 0); angVel.set(0, 0, 0);
                e.stopPropagation();
                return;
            }
            // Otherwise handle game click
            handleGameClick(e);
        }

        function onMouseMove(e) {
            getMouse(e);
            if (isDragging) {
                raycaster.setFromCamera(mouse, camera);
                const pt = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, pt);
                if (pt) {
                    prevCardPos.copy(timerCard.position);
                    timerCard.position.copy(pt.add(dragOffset));
                    // Tilt card slightly based on drag direction
                    const dx = mouse.x - prevMouse.x;
                    const dy = mouse.y - prevMouse.y;
                    timerCard.rotation.z += -dx * 0.8;
                    timerCard.rotation.x += dy * 0.5;
                    timerCard.rotation.z *= 0.88;
                    timerCard.rotation.x *= 0.88;
                    prevMouse.copy(mouse);
                }
            } else {
                // Hover detect
                raycaster.setFromCamera(mouse, camera);
                const h = raycaster.intersectObject(timerCard, true);
                renderer.domElement.style.cursor = h.length ? 'grab' : 'default';
            }
        }

        function onMouseUp(e) {
            if (!isDragging) return;
            isDragging = false;
            renderer.domElement.style.cursor = 'default';
            // Throw velocity = how far card moved since last frame
            vel.subVectors(timerCard.position, prevCardPos).multiplyScalar(1.4);
            vel.clampLength(0, 0.5); // max throw speed
            // Angular velocity from throw direction
            angVel.set(
                (Math.random() - 0.5) * Math.abs(vel.y) * 8,
                0,
                -vel.x * 6
            );
        }

        // ─── GAME INTERACTION ─────────────────────────────────────────────────────────
        let selectedPeg = null, isAnimating = false;

        function handleGameClick(e) {
            if (isAnimating || game?.isWon()) return;
            getMouse(e);
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(clickZones);
            if (!hits.length) { clearSel(); return; }
            const pegIdx = hits[0].object.userData.pegIndex;

            if (selectedPeg === null) {
                if (!game.pegs[pegIdx].length) return;
                selectedPeg = pegIdx;
                pegMeshes[pegIdx].material.color.setHex(0x2962ff);
                const td = game.topDisk(pegIdx);
                if (td) diskMeshes[td].material.emissive = new THREE.Color(0x1a3a8f);
                setStatus(`peg ${['A', 'B', 'C'][pegIdx]} selected — click destination`);
            } else {
                if (pegIdx === selectedPeg) { clearSel(); setStatus('click a peg to select — click again to move'); return; }
                if (game.canMove(selectedPeg, pegIdx)) {
                    if (game.moves === 0 && !timerRunning) startTimer();
                    const from = selectedPeg; clearSel();
                    animMove(from, pegIdx);
                    setStatus('click a peg to select — click again to move');
                } else {
                    setStatus('invalid move — destination disk is smaller');
                    setTimeout(() => setStatus('click a peg to select — click again to move'), 1500);
                }
            }
        }

        function clearSel() {
            if (selectedPeg !== null) {
                pegMeshes[selectedPeg].material.color.setHex(0x888888);
                const td = game.topDisk(selectedPeg);
                if (td && diskMeshes[td]) diskMeshes[td].material.emissive?.setHex(0x000000);
                selectedPeg = null;
            }
        }

        function setStatus(t) { document.getElementById('status-bar').textContent = t; }

        // ─── DISK ANIMATION ──────────────────────────────────────────────────────────
        const LIFT_Y = PEG_HEIGHT + 1.4;
        const ANIM_DUR = 500;

        function ease(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

        function animMove(from, to) {
            isAnimating = true;
            const d = game.topDisk(from);
            game.move(from, to);
            document.getElementById('move-count').textContent = game.moves;
            const mesh = diskMeshes[d];
            const sx = PEG_X[from], sy = mesh.position.y;
            const ex = PEG_X[to], ey = diskY(game.pegs[to].length - 1);
            const phases = [
                { fx: sx, fy: sy, tx: sx, ty: LIFT_Y, d: ANIM_DUR * 0.28 },
                { fx: sx, fy: LIFT_Y, tx: ex, ty: LIFT_Y, d: ANIM_DUR * 0.44 },
                { fx: ex, fy: LIFT_Y, tx: ex, ty: ey, d: ANIM_DUR * 0.28 },
            ];
            let pi = 0, ps = null;
            function step(ts) {
                if (!ps) ps = ts;
                const ph = phases[pi];
                const t = ease(Math.min((ts - ps) / ph.d, 1));
                mesh.position.x = ph.fx + (ph.tx - ph.fx) * t;
                mesh.position.y = ph.fy + (ph.ty - ph.fy) * t;
                if (t < 1) { requestAnimationFrame(step); }
                else { pi++; if (pi < phases.length) { ps = null; requestAnimationFrame(step); } else { isAnimating = false; if (game.isWon()) { stopTimer(); showWin(); } } }
            }
            requestAnimationFrame(step);
        }

        // ─── TIMER ────────────────────────────────────────────────────────────────────
        let timerMs = 0, timerRunning = false, timerInterval = null;

        function startTimer() {
            const t0 = performance.now() - timerMs;
            timerRunning = true;
            timerInterval = setInterval(() => { timerMs = performance.now() - t0; }, 50);
        }
        function stopTimer() { timerRunning = false; clearInterval(timerInterval); }

        function fmt(ms) {
            const s = Math.floor(ms / 1000);
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sc = (s % 60).toString().padStart(2, '0');
            const t = Math.floor((ms % 1000) / 100);
            return `${m}:${sc}.${t}`;
        }

        function showWin() {
            const ov = document.getElementById('win-overlay');
            document.getElementById('win-time-display').textContent = fmt(timerMs);
            document.getElementById('win-moves-display').textContent = `${game.moves} moves — optimal: ${Math.pow(2, game.n) - 1}`;
            ov.classList.add('show');
        }

        // ─── RESET ────────────────────────────────────────────────────────────────────
        function resetGame() {
            clearSel(); isAnimating = false;
            game = new HanoiGame(numDisks);
            buildDisks(numDisks); syncDisks();
            stopTimer(); timerMs = 0;
            document.getElementById('move-count').textContent = '0';
            document.getElementById('win-overlay').classList.remove('show');
            setStatus('click a peg to select — click again to move');
        }

        document.getElementById('reset-btn').addEventListener('click', resetGame);
        document.getElementById('win-reset').addEventListener('click', resetGame);
        document.getElementById('disk-select').addEventListener('change', e => { numDisks = +e.target.value; resetGame(); });
        window.addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') resetGame(); });

        // ─── RESIZE ───────────────────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            renderer.setSize(innerWidth, innerHeight);
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
        });

        // ─── RENDER LOOP ──────────────────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            physicsStep();
            drawTimerCard(fmt(timerMs), `${game?.moves ?? 0} moves`);
            renderer.render(scene, camera);
        }

        resetGame();
        animate();
    </script>
</body>

</html>
